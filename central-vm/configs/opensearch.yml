cluster.name: ${OPENSEARCH_CLUSTER_NAME}
node.name: ${OPENSEARCH_NODE_NAME}

network.host: 0.0.0.0
http.port: 9200

# ---- TLS (Transport: node-to-node) ----
plugins.security.ssl.transport.enabled: true
plugins.security.ssl.transport.pemcert_filepath: certs/opensearch/opensearch.crt
plugins.security.ssl.transport.pemkey_filepath: certs/opensearch/opensearch.key
plugins.security.ssl.transport.pemtrustedcas_filepath: certs/ca/ca.crt
plugins.security.ssl.transport.enforce_hostname_verification: true

# ---- TLS (HTTP: client-to-node) ----
plugins.security.ssl.http.enabled: true
plugins.security.ssl.http.pemcert_filepath: certs/opensearch/opensearch.crt
plugins.security.ssl.http.pemkey_filepath: certs/opensearch/opensearch.key
plugins.security.ssl.http.pemtrustedcas_filepath: certs/ca/ca.crt

# 🔐 REQUIRED for admin cert authentication
plugins.security.ssl.http.clientauth_mode: OPTIONAL

# Security plugin
plugins.security.allow_default_init_securityindex: true
plugins.security.restapi.roles_enabled: ["all_access", "security_rest_api_access"]

# Admin cert DN (must match your cert subject)
plugins.security.authcz.admin_dn:
  - "CN=admin,O=NDR,L=Paris,ST=IDF,C=FR"

# Node cert DN allow-list
plugins.security.nodes_dn:
  - "C=FR,ST=IDF,L=Paris,O=NDR,CN=opensearch-node1"

path.logs: /usr/share/opensearch/logs
http.compression: true
indices.query.bool.max_clause_count: 4096
